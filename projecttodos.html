<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project ToDos</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #111827, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 28px;
        }

        .todo-card {
            width: 90%;
            max-width: 680px;
            background: #0f172a;
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55);
            border: 2px solid rgba(255, 255, 255, 0.12);
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 34px;
            margin-bottom: 22px;
            letter-spacing: 1px;
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .todo {
            display: flex;
            align-items: center;
            gap: 10px;
            background: red;
            color: white;
            font-size: 20px;
            font-weight: 800;
            padding: 14px 18px;
            border-radius: 14px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
            transition: 0.25s ease;
            cursor: grab;
        }

        .todo:hover {
            transform: scale(1.01);
        }

        .todo.dragging {
            opacity: 0.45;
            transform: scale(0.97);
            cursor: grabbing;
        }

        .todo-text {
            flex: 1;
            min-width: 0;
            cursor: text;
            user-select: text;
            outline: none;
        }

        .todo-text:focus {
            outline: 3px solid white;
            outline-offset: 3px;
            border-radius: 6px;
        }

        .delete-btn {
            flex-shrink: 0;
            width: 34px;
            height: 34px;
            background: black;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 22px;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .delete-btn:hover {
            background: #111;
            transform: scale(1.06);
        }

        .delete-btn:active {
            transform: scale(0.96);
        }

        .hint {
            color: #cbd5e1;
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.4;
        }

        @media (max-width: 700px) {
            body {
                padding: 18px;
            }

            .todo-card {
                padding: 20px;
                border-radius: 16px;
            }

            h1 {
                font-size: 26px;
                margin-bottom: 16px;
            }

            .todo {
                font-size: 16px;
                padding: 12px 14px;
            }

            .delete-btn {
                width: 28px;
                height: 28px;
                font-size: 18px;
                border-radius: 8px;
            }

            .hint {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="todo-card" id="todoCard">
        <h1>FIFA | NHL | NBA</h1>

        <div class="todo-list" id="todoList"></div>

        <p class="hint">lolllllllll</p>
    </div>

    <script>
        const STORAGE_KEY = "projectTodos";
        const COLORS = ["red", "blue", "green"];
        const todoCard = document.getElementById("todoCard");
        const todoList = document.getElementById("todoList");

        const DEFAULT_TODOS = [
            { text: "Create Italy Thumbnail", color: "red" },
            { text: "Upload Football Short", color: "red" },
            { text: "Edit Squad Lineup", color: "red" },
            { text: "Check YouTube Analytics", color: "red" },
            { text: "Make Portugal Video", color: "red" },
            { text: "Design New Banner", color: "red" },
            { text: "Write Video Description", color: "red" },
            { text: "Prepare Player List", color: "red" },
            { text: "Post Next Short", color: "red" },
            { text: "Review Best Titles", color: "red" }
        ];

        function applyColor(todo, color) {
            const next = COLORS.includes(color) ? color : "red";
            todo.dataset.colorStep = next;
            todo.style.background = next;
        }

        function saveTodos() {
            const todos = [...todoList.querySelectorAll(".todo")].map(todo => ({
                text: todo.querySelector(".todo-text").textContent.trim(),
                color: todo.dataset.colorStep || "red"
            }));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        }

        function loadTodos() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw === null) return DEFAULT_TODOS;
                const saved = JSON.parse(raw);
                if (Array.isArray(saved)) return saved;
            } catch (error) {}
            return DEFAULT_TODOS;
        }

        function focusText(textEl) {
            textEl.focus();
            const range = document.createRange();
            range.selectNodeContents(textEl);
            range.collapse(true);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
        }

        function createTodo(text = "", color = "red") {
            const todo = document.createElement("div");
            todo.className = "todo";
            todo.draggable = true;
            todo.innerHTML = `
                <span class="todo-text" contenteditable="true"></span>
                <button class="delete-btn" type="button" aria-label="Delete todo">×</button>
            `;
            todo.querySelector(".todo-text").textContent = text;
            applyColor(todo, color);
            setupTodo(todo);
            return todo;
        }

        function setupTodo(todo) {
            const textEl = todo.querySelector(".todo-text");
            const deleteBtn = todo.querySelector(".delete-btn");

            deleteBtn.addEventListener("click", () => {
                todo.remove();
                saveTodos();
            });

            todo.addEventListener("dblclick", event => {
                if (event.target.closest(".delete-btn") || event.target.closest(".todo-text")) return;

                const current = todo.dataset.colorStep || "red";
                const next = COLORS[(COLORS.indexOf(current) + 1) % COLORS.length];
                applyColor(todo, next);
                saveTodos();
            });

            textEl.addEventListener("dblclick", event => {
                event.stopPropagation();
                const current = todo.dataset.colorStep || "red";
                const next = COLORS[(COLORS.indexOf(current) + 1) % COLORS.length];
                applyColor(todo, next);
                saveTodos();
            });

            textEl.addEventListener("input", saveTodos);

            textEl.addEventListener("keydown", event => {
                if (event.key !== "Enter") return;
                event.preventDefault();

                const newTodo = createTodo("");
                todo.after(newTodo);
                saveTodos();
                focusText(newTodo.querySelector(".todo-text"));
            });

            textEl.addEventListener("mousedown", () => {
                todo.draggable = false;
            });

            textEl.addEventListener("mouseup", () => {
                todo.draggable = true;
            });

            textEl.addEventListener("blur", () => {
                todo.draggable = true;
            });

            todo.addEventListener("dragstart", event => {
                if (event.target.closest(".todo-text") || event.target.closest(".delete-btn")) {
                    event.preventDefault();
                    return;
                }
                todo.classList.add("dragging");
            });

            todo.addEventListener("dragend", event => {
                todo.classList.remove("dragging");

                const cardBox = todoCard.getBoundingClientRect();
                const droppedOutside =
                    event.clientX < cardBox.left ||
                    event.clientX > cardBox.right ||
                    event.clientY < cardBox.top ||
                    event.clientY > cardBox.bottom;

                if (droppedOutside) {
                    todo.remove();
                    saveTodos();
                }
            });
        }

        loadTodos().forEach(({ text, color }) => {
            todoList.appendChild(createTodo(text, color));
        });
    </script>

</body>

</html>
