<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editable Todo Card</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #111827, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .todo-card {
            width: 90%;
            max-width: 1000px;
            background: #0f172a;
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
            border: 3px solid rgba(255, 255, 255, 0.12);
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 52px;
            margin-bottom: 35px;
            letter-spacing: 2px;
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .todo {
            display: flex;
            align-items: center;
            gap: 12px;
            background: red;
            color: white;
            font-size: 34px;
            font-weight: 900;
            padding: 22px 28px;
            border-radius: 22px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
            transition: 0.25s ease;
        }

        .todo:hover {
            transform: scale(1.015);
        }

        .todo-text {
            flex: 1;
            min-width: 0;
            cursor: text;
            user-select: text;
            outline: none;
        }

        .todo-text:focus {
            outline: 4px solid white;
            outline-offset: 4px;
            border-radius: 8px;
        }

        .delete-btn {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            background: black;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 32px;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .delete-btn:hover {
            background: #111;
            transform: scale(1.08);
        }

        .delete-btn:active {
            transform: scale(0.96);
        }

        .dragging {
            opacity: 0.45;
            transform: scale(0.95);
        }

        .hint {
            color: #cbd5e1;
            text-align: center;
            font-size: 20px;
            margin-top: 30px;
        }

        @media (max-width: 700px) {
            .todo-card {
                padding: 25px;
            }

            h1 {
                font-size: 38px;
            }

            .todo {
                font-size: 26px;
                padding: 18px 22px;
            }

            .delete-btn {
                width: 40px;
                height: 40px;
                font-size: 26px;
                border-radius: 12px;
            }

            .hint {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="todo-card" id="todoCard">
        <h1>FIFA | NHL | NBA</h1>

        <div class="todo-list" id="todoList"></div>

        <p class="hint">Click to edit • Enter to add below • Double click to change color • Press × to delete</p>
    </div>

    <script>
        const STORAGE_KEY = "projectTodos";
        const todoCard = document.getElementById("todoCard");
        const todoList = document.getElementById("todoList");

        const DEFAULT_TODOS = [
            { text: "Create Italy Thumbnail", color: "red" },
            { text: "Upload Football Short", color: "red" },
            { text: "Edit Squad Lineup", color: "red" },
            { text: "Check YouTube Analytics", color: "red" },
            { text: "Make Portugal Video", color: "red" },
            { text: "Design New Banner", color: "red" },
            { text: "Write Video Description", color: "red" },
            { text: "Prepare Player List", color: "red" },
            { text: "Post Next Short", color: "red" },
            { text: "Review Best Titles", color: "red" }
        ];

        function applyColor(todo, color) {
            const next = color || "red";
            todo.dataset.colorStep = next;
            todo.style.background = next;
        }

        function saveTodos() {
            const todos = [...todoList.querySelectorAll(".todo")].map(todo => ({
                text: todo.querySelector(".todo-text").textContent.trim(),
                color: todo.dataset.colorStep || "red"
            }));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        }

        function loadTodos() {
            try {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (Array.isArray(saved) && saved.length) return saved;
            } catch (error) {}
            return DEFAULT_TODOS;
        }

        function createTodo(text = "", color = "red") {
            const todo = document.createElement("div");
            todo.className = "todo";
            todo.innerHTML = `
                <span class="todo-text" contenteditable="true"></span>
                <button class="delete-btn" type="button" aria-label="Delete todo">×</button>
            `;
            todo.querySelector(".todo-text").textContent = text;
            applyColor(todo, color);
            setupTodo(todo);
            return todo;
        }

        function setupTodo(todo) {
            if (todo.dataset.setup) return;
            todo.dataset.setup = "true";
            if (!todo.dataset.colorStep) applyColor(todo, "red");

            const textEl = todo.querySelector(".todo-text");
            const deleteBtn = todo.querySelector(".delete-btn");

            deleteBtn.addEventListener("click", () => {
                todo.remove();
                saveTodos();
            });

            todo.addEventListener("dblclick", event => {
                if (event.target.closest(".delete-btn")) return;

                if (todo.dataset.colorStep === "red") {
                    applyColor(todo, "blue");
                } else if (todo.dataset.colorStep === "blue") {
                    applyColor(todo, "green");
                } else {
                    applyColor(todo, "red");
                }
                saveTodos();
            });

            textEl.addEventListener("input", saveTodos);

            textEl.addEventListener("keydown", event => {
                if (event.key !== "Enter") return;
                event.preventDefault();

                const newTodo = createTodo("");
                todo.after(newTodo);
                saveTodos();

                const newText = newTodo.querySelector(".todo-text");
                newText.focus();

                const range = document.createRange();
                range.selectNodeContents(newText);
                range.collapse(true);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
            });

            todo.addEventListener("dragstart", () => {
                todo.classList.add("dragging");
            });

            todo.addEventListener("dragend", event => {
                todo.classList.remove("dragging");

                const cardBox = todoCard.getBoundingClientRect();
                const droppedOutside =
                    event.clientX < cardBox.left ||
                    event.clientX > cardBox.right ||
                    event.clientY < cardBox.top ||
                    event.clientY > cardBox.bottom;

                if (droppedOutside) {
                    todo.remove();
                    saveTodos();
                }
            });
        }

        loadTodos().forEach(({ text, color }) => {
            todoList.appendChild(createTodo(text, color));
        });
    </script>

</body>
</html>
