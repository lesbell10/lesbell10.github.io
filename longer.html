<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Track Picker (BIG)</title>
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT24ZNvZi2ZHpSKhbEQCJzW0S6ImR3BnNk3wg&s" type="image/x-icon" />
    <style>
        :root {
            --accent: #e11d48;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
            color: #111;
            margin: 24px;
            font-size: 24px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 36px;
        }

        .actions {
            margin-bottom: 18px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            cursor: pointer;
            background: #fff;
            font-size: 24px;
            transition: .15s;
        }

        button:hover {
            background: #eee;
        }

        button:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        #status {
            font-size: 18px;
            color: #666;
        }

        #list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 10px;
        }

        .item {
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: .15s;
            user-select: none;
        }

        .item:hover {
            border-color: #aaa;
        }

        .item.selected {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .note {
            color: #666;
            font-size: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Music for Techno</h1>
    <div class="actions">
        <button id="resetBtn">Reset</button>
        <span class="note">Click a card to toggle red. Selections are saved in local storage.</span>
        <span id="status" class="hidden"></span>
    </div>

    <div id="list" aria-live="polite"></div>

    <script type="module">
        const STORAGE_KEY = "track-picker-local-crud-big";
        const list = document.getElementById("list");
        const resetBtn = document.getElementById("resetBtn");
        const statusEl = document.getElementById("status");

        function setStatus(msg) {
            if (!msg) {
                statusEl.classList.add("hidden");
                statusEl.textContent = "";
                return;
            }

            statusEl.textContent = msg;
            statusEl.classList.remove("hidden");
        }

        async function readSeedData() {
            const response = await fetch("./longer.json");
            if (!response.ok) {
                throw new Error("Could not load longer.json");
            }

            return response.json();
        }

        async function readTracks() {
            const seedTracks = await readSeedData();
            const saved = localStorage.getItem(STORAGE_KEY);

            if (!saved) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(seedTracks));
                return seedTracks;
            }

            const savedTracks = JSON.parse(saved);
            const savedMap = new Map(savedTracks.map((track) => [track.id, track]));
            const mergedTracks = seedTracks.map((track) => {
                const savedTrack = savedMap.get(track.id);
                return savedTrack
                    ? { ...track, selected: Boolean(savedTrack.selected) }
                    : track;
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(mergedTracks));
            return mergedTracks;
        }

        function saveTracks(tracks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tracks));
        }

        function shuffleTracks(tracks) {
            const shuffled = tracks.slice();

            for (let i = shuffled.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            return shuffled;
        }

        async function renderTracks() {
            setStatus("Loading...");
            list.innerHTML = "";

            try {
                const tracks = await readTracks();
                const frag = document.createDocumentFragment();

                shuffleTracks(tracks).forEach((track) => {
                    const div = document.createElement("div");
                    div.className = "item" + (track.selected ? " selected" : "");
                    div.dataset.id = String(track.id);
                    div.dataset.selected = String(Boolean(track.selected));
                    div.textContent = track.title;
                    frag.appendChild(div);
                });

                list.appendChild(frag);
                setStatus("");
            } catch (error) {
                console.error("Error loading tracks:", error);
                setStatus("Error loading tracks. Check console.");
            }
        }

        async function updateTrack(id, selected) {
            const tracks = await readTracks();
            const nextTracks = tracks.map((track) =>
                track.id === id ? { ...track, selected } : track
            );
            saveTracks(nextTracks);
        }

        async function resetTracks() {
            const tracks = await readTracks();
            const nextTracks = tracks.map((track) => ({ ...track, selected: false }));
            saveTracks(nextTracks);
        }

        async function toggle(el) {
            if (!el?.classList.contains("item")) {
                return;
            }

            const id = Number(el.dataset.id);
            const isSelected = el.classList.contains("selected");
            const newVal = !isSelected;

            el.classList.toggle("selected", newVal);
            el.dataset.selected = String(newVal);

            try {
                await updateTrack(id, newVal);
            } catch (error) {
                console.error("Update failed:", error);
                el.classList.toggle("selected", isSelected);
                el.dataset.selected = String(isSelected);
                setStatus("Could not save. Try again.");
            }
        }

        list.addEventListener("click", (e) => {
            const card = e.target.closest(".item");
            toggle(card);
        });

        resetBtn.addEventListener("click", async () => {
            resetBtn.disabled = true;
            setStatus("Resetting...");

            try {
                await resetTracks();
                document
                    .querySelectorAll(".item.selected")
                    .forEach((el) => {
                        el.classList.remove("selected");
                        el.dataset.selected = "false";
                    });
                setStatus("All selections cleared.");
                window.setTimeout(() => setStatus(""), 1500);
            } catch (error) {
                console.error("Reset failed:", error);
                setStatus("Reset failed. Check console.");
            } finally {
                resetBtn.disabled = false;
            }
        });

        renderTracks();
    </script>
</body>
</html>
